services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: price-backend
    ports:
      - "8000:8000"
    volumes:
      - poi_cache_data:/app/data
      - ./frontend/public/data:/app/source_data:ro
      - ./model.joblib:/app/model.joblib:ro

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: price-frontend
    environment:
      - VITE_API_PROXY_TARGET=http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  poi_cache_data:
